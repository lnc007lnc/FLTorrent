# ============================================================================
# Experiments for GPU3 Node - DistilBERT-base + SST-2 Study
# ============================================================================
#
# Usage:
#   python run_ray_hpc.py --batch experiments_gpu3.yaml
#
# Node: GPU3 (srv-it-node03) - 128 CPUs, 1.5TB RAM, 2x GPUs
# Model: DistilBERT-base-uncased (~66M parameters)
# Dataset: SST-2 (Stanford Sentiment Treebank, binary classification)
#
# Total: 15 experiments
#   Set 1 (6): Baseline - timeout=inf (100%) and timeout=0 (local only) × alpha={10000, 1.0, 0.3}
#   Set 2 (9): Compensation ON, tau=0.01, timeout={300s, 600s, 900s} × alpha={10000, 1.0, 0.3}
#
# ============================================================================

# Global settings for DistilBERT + SST-2 on GPU3
global:
  code_snapshot_dir: "/home/naicheng_li/FLTorrent/experiments_snapshots"
  output_base_dir: "/home/naicheng_li/FLTorrent/experiments_output_gpu3"

  # GPU3 Node Resources (1.5TB RAM for DistilBERT)
  partition: "gpu3"
  nodes: 1
  gpus_per_node: 2
  cpus_per_task: 128
  mem: "1400G"
  time_limit: "48:00:00"

